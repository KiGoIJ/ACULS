<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>АСУЛС ТУ ФСБ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>⚔ АСУЛС ТУ ФСБ (игровой)</h1>
    <button id="exportBtn">Экспорт JSON</button>
    <input type="file" id="importInput" accept=".json" style="display:none">
    <button id="importBtn">Импорт JSON</button>
  </header>
  <main>
    <section id="formSection">
      <h2>Добавить сотрудника</h2>
      <form id="employeeForm">
        <input type="text" id="lastName" placeholder="Фамилия" required>
        <input type="text" id="firstName" placeholder="Имя" required>
        <input type="text" id="patronymic" placeholder="Отчество">
        <input type="date" id="birthDate">
        <select id="gender">
          <option value="мужской">Мужской</option>
          <option value="женский">Женский</option>
        </select>
        <input type="text" id="department" placeholder="Подразделение">
        <input type="text" id="rank" placeholder="Звание">
        <input type="text" id="position" placeholder="Должность">
        <input type="text" id="personalNumber" placeholder="Личный номер">
        <input type="date" id="hireDate">
        <select id="status">
          <option value="действует">Действует</option>
          <option value="отпуск">Отпуск</option>
          <option value="командировка">Командировка</option>
          <option value="уволен">Уволен</option>
        </select>
        <button type="submit">Добавить</button>
        <button type="reset">Очистить</button>
      </form>
    </section>
    <section id="listSection">
      <h2>Список личного состава</h2>
      <input type="text" id="searchInput" placeholder="Поиск по ФИО...">
      <table id="employeeTable">
        <thead>
          <tr>
            <th>ФИО</th><th>Подразделение</th><th>Звание</th><th>Должность</th><th>Статус</th><th>Действия</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <!-- строки генерируются JS -->
        </tbody>
      </table>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
