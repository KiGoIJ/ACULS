<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>АСУЛС ТУ ФСБ</title>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ЭКРАН ВХОДА -->
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <i class="fas fa-shield-alt"></i>
        <span>АСУЛС ТУ ФСБ</span>
      </div>
      <p class="login-sub">Введите пароль для доступа к системе</p>
      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="passwordInput">Пароль</label>
          <input type="password" id="passwordInput" placeholder="••••••••" required autofocus />
        </div>
        <button type="submit" class="btn btn--gold btn--full"><i class="fas fa-sign-in-alt"></i> Войти</button>
        <div id="loginError" class="login-error" style="display:none;">Неверный пароль. Попробуйте снова.</div>
      </form>
      <div class="login-hint">По умолчанию: <strong>admin</strong></div>
    </div>
  </div>

  <!-- ОСНОВНОЙ КОНТЕНТ (скрыт до входа) -->
  <div id="appContent" style="display:none;">

    <!-- ШАПКА -->
    <header class="header">
      <div class="container header__inner">
        <div class="header__logo">
          <i class="fas fa-shield-alt"></i>
          <span>АСУЛС ТУ ФСБ</span>
        </div>
        <div class="header__actions">
          <button id="changePasswordBtn" class="btn btn--gold"><i class="fas fa-key"></i> Сменить пароль</button>
          <button id="logoutBtn" class="btn btn--secondary"><i class="fas fa-sign-out-alt"></i> Выйти</button>
          <button id="exportBtn" class="btn btn--gold"><i class="fas fa-file-export"></i> Экспорт JSON</button>
          <button id="importBtn" class="btn btn--gold"><i class="fas fa-file-import"></i> Импорт JSON</button>
          <input type="file" id="importInput" accept=".json" style="display:none" />
        </div>
      </div>
    </header>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <main class="container main">
      <!-- Карточка формы -->
      <section class="card">
        <h2 class="card__title"><i class="fas fa-user-plus"></i> Добавить сотрудника</h2>
        <form id="employeeForm" class="form-grid">
          <div class="form-group">
            <label for="lastName">Фамилия *</label>
            <input type="text" id="lastName" placeholder="Иванов" required />
          </div>
          <div class="form-group">
            <label for="firstName">Имя *</label>
            <input type="text" id="firstName" placeholder="Иван" required />
          </div>
          <div class="form-group">
            <label for="patronymic">Отчество</label>
            <input type="text" id="patronymic" placeholder="Иванович" />
          </div>
          <div class="form-group">
            <label for="birthDate">Дата рождения</label>
            <input type="date" id="birthDate" />
          </div>
          <div class="form-group">
            <label for="gender">Пол</label>
            <select id="gender">
              <option value="мужской">Мужской</option>
              <option value="женский">Женский</option>
            </select>
          </div>
          <div class="form-group">
            <label for="department">Подразделение</label>
            <input type="text" id="department" placeholder="Управление «А»" />
          </div>
          <div class="form-group">
            <label for="rank">Звание</label>
            <input type="text" id="rank" placeholder="полковник" />
          </div>
          <div class="form-group">
            <label for="position">Должность</label>
            <input type="text" id="position" placeholder="Начальник отдела" />
          </div>
          <div class="form-group">
            <label for="personalNumber">Личный номер</label>
            <input type="text" id="personalNumber" placeholder="123456" />
          </div>
          <div class="form-group">
            <label for="hireDate">Дата принятия</label>
            <input type="date" id="hireDate" />
          </div>
          <div class="form-group">
            <label for="status">Статус</label>
            <select id="status">
              <option value="действует">Действует</option>
              <option value="отпуск">Отпуск</option>
              <option value="командировка">Командировка</option>
              <option value="уволен">Уволен</option>
            </select>
          </div>
          <div class="form-group form-group--full">
            <button type="submit" class="btn btn--primary"><i class="fas fa-save"></i> Добавить</button>
            <button type="reset" class="btn btn--secondary"><i class="fas fa-undo"></i> Очистить</button>
          </div>
        </form>
      </section>

      <!-- Карточка списка -->
      <section class="card">
        <h2 class="card__title"><i class="fas fa-users"></i> Список личного состава</h2>
        <div class="search-bar">
          <i class="fas fa-search"></i>
          <input type="text" id="searchInput" placeholder="Поиск по ФИО..." />
        </div>
        <div class="table-responsive">
          <table id="employeeTable">
            <thead>
              <tr>
                <th>ФИО</th>
                <th>Подразделение</th>
                <th>Звание</th>
                <th>Должность</th>
                <th>Статус</th>
                <th>Действия</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <!-- строки генерируются JS -->
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <!-- ПОДВАЛ -->
    <footer class="footer">
      <div class="container">
        <p>© 2026 АСУЛС ТУ ФСБ. Все данные хранятся локально.</p>
      </div>
    </footer>

  </div> <!-- конец #appContent -->

  <!-- Модальное окно смены пароля -->
  <div id="changePasswordModal" class="modal" style="display:none;">
    <div class="modal-content">
      <span class="modal-close" id="modalClose">&times;</span>
      <h3><i class="fas fa-key"></i> Смена пароля</h3>
      <form id="changePasswordForm">
        <div class="form-group">
          <label for="oldPassword">Старый пароль</label>
          <input type="password" id="oldPassword" required />
        </div>
        <div class="form-group">
          <label for="newPassword">Новый пароль</label>
          <input type="password" id="newPassword" required minlength="4" />
        </div>
        <div class="form-group">
          <label for="confirmPassword">Подтвердите новый пароль</label>
          <input type="password" id="confirmPassword" required />
        </div>
        <button type="submit" class="btn btn--primary"><i class="fas fa-save"></i> Сохранить</button>
        <div id="changePasswordError" class="login-error" style="display:none;"></div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
