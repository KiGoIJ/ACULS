<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>АСУЛС ТУ ФСБ</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- МОДАЛЬНОЕ ОКНО АВТОРИЗАЦИИ -->
  <div id="authModal" class="auth-modal">
    <div class="auth-modal__content">
      <div class="auth-modal__header">
        <i class="fas fa-shield-alt"></i>
        <h2>АСУЛС ТУ ФСБ</h2>
        <p>Введите пароль для доступа к системе</p>
      </div>
      <div class="auth-modal__body">
        <form id="authForm">
          <div class="auth-form-group">
            <label for="passwordInput"><i class="fas fa-lock"></i> Пароль</label>
            <input type="password" id="passwordInput" placeholder="Введите пароль" autofocus />
          </div>
          <button type="submit" class="btn btn--gold btn--block">Войти</button>
          <div id="authError" class="auth-error"></div>
        </form>
      </div>
      <div class="auth-modal__footer">
        <span>© 2026 ТУ ФСБ</span>
      </div>
    </div>
  </div>

  <!-- ОСНОВНОЙ КОНТЕНТ (скрыт до авторизации) -->
  <div id="mainApp" style="display:none;">

    <!-- ШАПКА -->
    <header class="header">
      <div class="container header__inner">
        <div class="header__logo">
          <i class="fas fa-shield-alt"></i>
          <span>АСУЛС ТУ ФСБ</span>
        </div>
        <div class="header__actions">
          <button id="logoutBtn" class="btn btn--danger"><i class="fas fa-sign-out-alt"></i> Выйти</button>
          <button id="exportBtn" class="btn btn--gold"><i class="fas fa-file-export"></i> Экспорт JSON</button>
          <button id="importBtn" class="btn btn--gold"><i class="fas fa-file-import"></i> Импорт JSON</button>
          <input type="file" id="importInput" accept=".json" style="display:none" />
        </div>
      </div>
    </header>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <main class="container main">
      <!-- Карточка формы -->
      <section class="card">
        <h2 class="card__title"><i class="fas fa-user-plus"></i> Добавить сотрудника</h2>
        <form id="employeeForm" class="form-grid">
          <!-- поля такие же -->
          <div class="form-group">
            <label for="lastName">Фамилия *</label>
            <input type="text" id="lastName" placeholder="Иванов" required />
          </div>
          <div class="form-group">
            <label for="firstName">Имя *</label>
            <input type="text" id="firstName" placeholder="Иван" required />
          </div>
          <div class="form-group">
            <label for="patronymic">Отчество</label>
            <input type="text" id="patronymic" placeholder="Иванович" />
          </div>
          <div class="form-group">
            <label for="birthDate">Дата рождения</label>
            <input type="date" id="birthDate" />
          </div>
          <div class="form-group">
            <label for="gender">Пол</label>
            <select id="gender">
              <option value="мужской">Мужской</option>
              <option value="женский">Женский</option>
            </select>
          </div>
          <div class="form-group">
            <label for="department">Подразделение</label>
            <input type="text" id="department" placeholder="Управление «А»" />
          </div>
          <div class="form-group">
            <label for="rank">Звание</label>
            <input type="text" id="rank" placeholder="полковник" />
          </div>
          <div class="form-group">
            <label for="position">Должность</label>
            <input type="text" id="position" placeholder="Начальник отдела" />
          </div>
          <div class="form-group">
            <label for="personalNumber">Личный номер</label>
            <input type="text" id="personalNumber" placeholder="123456" />
          </div>
          <div class="form-group">
            <label for="hireDate">Дата принятия</label>
            <input type="date" id="hireDate" />
          </div>
          <div class="form-group">
            <label for="status">Статус</label>
            <select id="status">
              <option value="действует">Действует</option>
              <option value="отпуск">Отпуск</option>
              <option value="командировка">Командировка</option>
              <option value="уволен">Уволен</option>
            </select>
          </div>
          <div class="form-group form-group--full">
            <button type="submit" class="btn btn--primary"><i class="fas fa-save"></i> Добавить</button>
            <button type="reset" class="btn btn--secondary"><i class="fas fa-undo"></i> Очистить</button>
          </div>
        </form>
      </section>

      <!-- Карточка списка -->
      <section class="card">
        <h2 class="card__title"><i class="fas fa-users"></i> Список личного состава</h2>
        <div class="search-bar">
          <i class="fas fa-search"></i>
          <input type="text" id="searchInput" placeholder="Поиск по ФИО..." />
        </div>
        <div class="table-responsive">
          <table id="employeeTable">
            <thead>
              <tr>
                <th>ФИО</th>
                <th>Подразделение</th>
                <th>Звание</th>
                <th>Должность</th>
                <th>Статус</th>
                <th>Действия</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <!-- строки генерируются JS -->
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container">
        <p>© 2026 АСУЛС ТУ ФСБ. Все данные хранятся локально.</p>
      </div>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
